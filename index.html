            I: { name: "研究型 (Investigative)", desc: "思考分析、解決問題" },
            A: { name: "藝術型 (Artistic)", desc: "創新直覺、自我表達" },
            S: { name: "社交型 (Social)", desc: "助人教導、重視關係" },
            E: { name: "企業型 (Enterprising)", desc: "領導說服、追求成就" },
            C: { name: "事務型 (Conventional)", desc: "按部就班、重視精確" }
        };

        // --- UTILS ---
        
        const MODULES_MAP = ['disc', 'values', 'outcomes', 'traits', 'enneagram', 'big5', 'holland'];

        const compress = (data) => {
            if (!data) return data;
            
            if (data.modules && data.timestamp && !data.answers) {
                const mIdx = data.modules.map((m) => MODULES_MAP.indexOf(m));
                return { v: 2, t: 'c', d: [mIdx, data.timestamp] };
            }

            if (data.answers && data.candidate) {
                const c = [data.candidate.name, data.candidate.dob];
                const a = {};
                const ans = data.answers;

                if (ans.disc) a.d = [ans.disc.D || 0, ans.disc.I || 0, ans.disc.S || 0, ans.disc.C || 0];
                
                if (ans.values) {
                a.v = Object.entries(ans.values).map(([k, v]) => {
                    const idx = VALUES_DEFINITIONS.findIndex(def => def.id === k);
                    return idx >= 0 ? [idx, v] : null;
                }).filter(Boolean);
                }

                if (ans.outcomes) {
                a.o = ans.outcomes.map((item) => OUTCOMES_ITEMS.findIndex(def => def.id === item.id));
                }

                if (ans.traits) {
                a.t = ans.traits.map((t) => TRAITS_LIST.indexOf(t)).filter((i) => i >= 0);
                }

                if (ans.enneagram) {
                a.e = Array.from({length: 9}, (_, i) => ans.enneagram[String(i + 1)] || 0);
                }

                if (ans.big5) {
                a.b = [ans.big5.O || 0, ans.big5.C || 0, ans.big5.E || 0, ans.big5.A || 0, ans.big5.N || 0];
                }

                if (ans.holland) {
                a.h = [ans.holland.R || 0, ans.holland.I || 0, ans.holland.A || 0, ans.holland.S || 0, ans.holland.E || 0, ans.holland.C || 0];
                }

                const mIdx = data.config?.modules?.map((m) => MODULES_MAP.indexOf(m)) || [];

                return { v: 2, t: 'r', d: [c, a, mIdx, data.completedAt] };
            }
            return data;
        };

        const decompress = (data) => {
            if (!data || data.v !== 2) return data;

            if (data.t === 'c') {
                const [mIdx, timestamp] = data.d;
                return {
                modules: mIdx.map((i) => MODULES_MAP[i]),
                timestamp
                };
            }

            if (data.t === 'r') {
                const [c, a, mIdx, completedAt] = data.d;
                
                const candidate = { name: c[0], dob: c[1] };
                const config = { modules: mIdx.map((i) => MODULES_MAP[i]) };
                const answers = {};

                if (a.d) answers.disc = { D: a.d[0], I: a.d[1], S: a.d[2], C: a.d[3] };
                
                if (a.v) {
                answers.values = {};
                a.v.forEach(([i, val]) => {
                    if (VALUES_DEFINITIONS[i]) answers.values[VALUES_DEFINITIONS[i].id] = val;
                });
                }

                if (a.o) {
                answers.outcomes = a.o.map((i) => OUTCOMES_ITEMS[i]).filter(Boolean);
                }

                if (a.t) {
                answers.traits = a.t.map((i) => TRAITS_LIST[i]).filter(Boolean);
                }

                if (a.e) {
                answers.enneagram = {};
                a.e.forEach((val, i) => answers.enneagram[String(i + 1)] = val);
                }

                if (a.b) {
                answers.big5 = { O: a.b[0], C: a.b[1], E: a.b[2], A: a.b[3], N: a.b[4] };
                }

                if (a.h) {
                answers.holland = { R: a.h[0], I: a.h[1], A: a.h[2], S: a.h[3], E: a.h[4], C: a.h[5] };
                }

                return { candidate, config, answers, completedAt };
            }
            return data;
        };

        const safeEncode = (data) => {
            try {
                const processedData = compress(data);
                const jsonString = JSON.stringify(processedData);
                const bytes = new TextEncoder().encode(jsonString);
                const binString = Array.from(bytes, (byte) => String.fromCodePoint(byte)).join("");
                return btoa(binString);
            } catch (e) {
                console.error("Encoding error", e);
                return "";
            }
        };

        const safeDecode = (str) => {
            if (!str) return null;
            const cleanStr = str.trim();
            try {
                let decodedData = null;
                try {
                    const binString = atob(cleanStr);
                    const bytes = Uint8Array.from(binString, (c) => c.codePointAt(0));
                    decodedData = JSON.parse(new TextDecoder().decode(bytes));
                } catch (e) {
                    decodedData = JSON.parse(decodeURIComponent(escape(atob(cleanStr))));
                }
                return decompress(decodedData);
            } catch (e2) {
                return null;
            }
        };

        const handleCopyText = (text, onSuccess, onError) => {
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                if (successful) { if (onSuccess) onSuccess(); } 
                else { if (onError) onError(); }
            } catch (err) {
                if (onError) onError();
            }
        };

        const handleSafePrint = (setToast, candidateName) => {
            const printContent = document.getElementById('report-container');
            if (!printContent) return;

            const win = window.open('', '', 'height=842,width=595');
            if (!win) {
                setToast({ show: true, msg: "列印視窗被阻擋，請允許彈跳視窗", type: "error" });
                return;
            }
            
            const reportDate = new Date().toLocaleDateString().replace(/\//g, '-');
            const safeName = candidateName || '未知姓名';
            const docTitle = `性格分析報告 - ${safeName} - ${reportDate}`;
            
            const styles = document.getElementsByTagName('style')[0].innerHTML;
            
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${docTitle}</title>
                    <style>
                        ${styles}
                        body { padding: 40px; }
                        .no-print { display: none !important; }
                        .print-only { display: block !important; }
                    </style>
                </head>
                <body>
                    ${printContent.innerHTML}
                    <div class="footer">Personality Portal Analysis Report • Generated on ${new Date().toLocaleString()}</div>
                    <script>
                    window.onload = function() { window.print(); window.close(); }
                    <\/script>
                </body>
                </html>
            `;
            
            win.document.write(html);
            win.document.close();
        };

        // --- SUB-COMPONENTS ---

        const RadarChart = ({ data, size = 200, color = "#4f46e5" }) => {
            const count = data.length;
            const center = size / 2;
            const radius = (size / 2) - 45;
            const angleStep = (Math.PI * 2) / count;

            const getCoordinates = (value, index, maxVal) => {
                const angle = index * angleStep - Math.PI / 2;
                const r = (value / maxVal) * radius;
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                return { x, y };
            };

            const rawMax = Math.max(...data.map((d) => d.value), 1);
            const chartMax = Math.max(rawMax, 5);

            const gridLevels = [0.33, 0.66, 1];
            const gridPolygons = gridLevels.map(level => {
                return data.map((_, i) => {
                const { x, y } = getCoordinates(level * chartMax, i, chartMax); 
                return `${x},${y}`;
                }).join(" ");
            });

            const polygonPoints = data.map((d, i) => {
                const { x, y } = getCoordinates(d.value, i, chartMax);
                return `${x},${y}`;
            }).join(" ");

            const labelPoints = data.map((d, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = radius + 25;
                const x = center + r * Math.cos(angle);
                const y = center + r * Math.sin(angle);
                return { x, y, label: d.label };
            });

            return (
                <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                {gridPolygons.map((points, i) => (
                    <polygon key={i} points={points} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                ))}
                {data.map((_, i) => {
                    const { x, y } = getCoordinates(chartMax, i, chartMax);
                    return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
                })}
                <polygon points={polygonPoints} fill={color} fillOpacity="0.2" stroke={color} strokeWidth="2" />
                {data.map((d, i) => {
                    const { x, y } = getCoordinates(d.value, i, chartMax);
                    return <circle key={i} cx={x} cy={y} r="3" fill={color} />;
                })}
                {labelPoints.map((p, i) => (
                    <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" className="text-[11px] fill-slate-500 font-bold" style={{fontSize: '11px'}}>
                    {p.label}
                    </text>
                ))}
                </svg>
            );
        };

        function DiscModule({ onFinish, isLastStep }) {
            const [responses, setResponses] = useState({});
            const isComplete = DISC_QUESTIONS.every(q => responses[q.id]);
            return (
                <div className="space-y-8">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請在每一題中，選擇一個最符合您狀況的描述。</div>
                {DISC_QUESTIONS.map((q, i) => (
                    <div key={q.id} className="space-y-3">
                    <h3 className="font-bold text-lg text-slate-800">{i + 1}. {q.q}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {q.options.map(opt => (
                        <button key={opt.type} onClick={() => setResponses({...responses, [q.id]: opt.type})} className={`text-left p-4 rounded-lg border transition-all font-medium ${responses[q.id] === opt.type ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white border-gray-200 text-slate-600 hover:bg-gray-50'}`}>{opt.text}</button>
                        ))}
                    </div>
                    </div>
                ))}
                <button onClick={() => { const scores = { D: 0, I: 0, S: 0, C: 0 }; Object.values(responses).forEach(v => scores[v] = (scores[v] || 0) + 1); onFinish(scores); }} disabled={!isComplete} className="w-full btn-prominent mt-8">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function ValuesModule({ onFinish, isLastStep }) {
            const [phase, setPhase] = useState(1);
            const [top3, setTop3] = useState([]);
            const [idx, setIdx] = useState(0);
            const [pairChoices, setPairChoices] = useState({});

            if (phase === 1) {
                const toggle = (id) => { if (top3.includes(id)) setTop3(top3.filter(x => x !== id)); else if (top3.length < 3) setTop3([...top3, id]); };
                return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">階段一：請閱讀定義，並選出您認為「最重要」的 3 項。</div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {VALUES_DEFINITIONS.map(d => (
                        <div key={d.id} onClick={() => toggle(d.id)} className={`p-5 rounded-lg border cursor-pointer transition-all flex justify-between items-start ${top3.includes(d.id) ? 'border-slate-800 bg-gray-50 shadow-sm' : 'border-gray-200 hover:bg-gray-50'}`}>
                        <div><div className={`font-bold text-lg ${top3.includes(d.id) ? 'text-slate-900' : 'text-slate-700'}`}>{d.id}</div><div className="text-sm text-slate-500 mt-1">{d.text}</div></div>
                        {top3.includes(d.id) && <CheckCircle className="text-slate-800" />}
                        </div>
                    ))}
                    </div>
                    <button disabled={top3.length !== 3} onClick={() => setPhase(2)} className="w-full btn-prominent mt-4">進入階段二</button>
                </div>
                );
            }
            const pair = VALUES_PAIRS[idx];
            const choose = (val) => {
                const next = { ...pairChoices, [idx]: val };
                setPairChoices(next);
                if (idx < VALUES_PAIRS.length - 1) setTimeout(() => setIdx(idx + 1), 150);
                else { const tally = {}; Object.values(next).forEach(v => tally[v] = (tally[v] || 0) + 1); onFinish(tally); }
            };
            return (
                <div className="max-w-xl mx-auto text-center space-y-8 py-8 animate-fade-in">
                <div className="inline-block px-4 py-1 bg-gray-100 rounded-full text-xs font-bold text-slate-500 tracking-wide">題數 {idx + 1} / {VALUES_PAIRS.length}</div>
                <h3 className="text-2xl font-extrabold text-slate-900">您認為哪一項較符合您的價值觀？</h3>
                <div className="grid grid-cols-1 gap-6">
                    <button onClick={() => choose(pair.A)} className="p-8 border border-gray-200 rounded-lg hover:border-slate-400 hover:bg-gray-50 transition-all text-2xl font-bold text-slate-700 hover:text-slate-900 shadow-sm hover:shadow-md">{pair.A}</button>
                    <div className="text-slate-300 font-bold text-sm tracking-widest">OR</div>
                    <button onClick={() => choose(pair.B)} className="p-8 border border-gray-200 rounded-lg hover:border-slate-400 hover:bg-gray-50 transition-all text-2xl font-bold text-slate-700 hover:text-slate-900 shadow-sm hover:shadow-md">{pair.B}</button>
                </div>
                </div>
            );
        }

        function OutcomesModule({ onFinish, isLastStep }) {
            const [pool, setPool] = useState(OUTCOMES_ITEMS);
            const [ranked, setRanked] = useState([]);

            const add = (item) => { setRanked([...ranked, item]); setPool(pool.filter(i => i.id !== item.id)); };
            const remove = (item) => { 
                 const newPool = [...pool, item].sort((a, b) => parseInt(a.id.substring(1)) - parseInt(b.id.substring(1)));
                 setPool(newPool); 
                 setRanked(ranked.filter(i => i.id !== item.id)); 
            };
            const move = (idx, dir) => {
                if ((dir === -1 && idx === 0) || (dir === 1 && idx === ranked.length - 1)) return;
                const copy = [...ranked]; const temp = copy[idx]; copy[idx] = copy[idx + dir]; copy[idx + dir] = temp; setRanked(copy);
            };

            return (
                <div className="space-y-6">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請將左側項目點擊加入右側，並透過箭頭調整排序（越上方越重要）。需完成所有排序。</div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-auto lg:h-[600px]">
                    <div className="bg-gray-50 rounded-lg p-4 flex flex-col h-[500px] lg:h-full border border-gray-200 shadow-inner">
                    <div className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-3">待選項目 ({pool.length})</div>
                    <div className="overflow-y-auto flex-1 space-y-3 pr-2 custom-scroller">
                        {pool.map(item => (
                        <div key={item.id} onClick={() => add(item)} className="bg-white p-4 rounded-md shadow-sm border border-gray-200 cursor-pointer hover:border-emerald-400 hover:shadow-md transition-all group">
                            <div className="flex justify-between items-start mb-2">
                            <span className="text-lg font-bold text-slate-800 group-hover:text-emerald-700">{item.term}</span>
                            <Plus size={20} className="text-slate-300 group-hover:text-emerald-500"/>
                            </div>
                            <p className="text-sm text-slate-600 mb-3 leading-relaxed">{item.desc}</p>
                            {item.questions && (
                            <div className="bg-slate-50 p-3 rounded text-xs text-slate-500 leading-relaxed border border-slate-100">
                                {item.questions.map((q, idx) => <div key={idx} className="mb-1 last:mb-0">{q}</div>)}
                            </div>
                            )}
                        </div>
                        ))}
                    </div>
                    </div>
                    <div className="bg-white rounded-lg p-4 flex flex-col h-[500px] lg:h-full border-2 border-slate-100 shadow-lg">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-widest text-center mb-3">您的排序 (Top 1 最重要)</div>
                    <div className="overflow-y-auto flex-1 space-y-2 pr-2 custom-scroller">
                        {ranked.map((item, i) => (
                        <div key={item.id} className="bg-slate-50 p-3 rounded-md border border-slate-200 flex items-center gap-3 animate-fade-in">
                            <div className={`w-8 h-8 rounded flex items-center justify-center font-bold text-sm shrink-0 ${i < 3 ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-gray-200'}`}>{i + 1}</div>
                            <div className="flex-1">
                            <span className="text-sm font-bold text-slate-800 block">{item.term}</span>
                            </div>
                            <div className="flex gap-1 shrink-0"><button onClick={() => move(i, -1)} className="p-1 hover:bg-white rounded text-slate-400 hover:text-slate-800"><ChevronUp size={18}/></button><button onClick={() => move(i, 1)} className="p-1 hover:bg-white rounded text-slate-400 hover:text-slate-800"><ChevronDown size={18}/></button><button onClick={() => remove(item)} className="p-1 hover:bg-red-50 rounded text-slate-300 hover:text-red-500 ml-1"><X size={18}/></button></div>
                        </div>
                        ))}
                    </div>
                    </div>
                </div>
                <div className="pt-4"><button disabled={pool.length > 0} onClick={() => onFinish(ranked)} className="w-full btn-prominent">{isLastStep ? "完成測驗" : "下一步"}</button></div>
                </div>
            );
        }

        function TraitsModule({ onFinish, isLastStep }) {
            const [checked, setChecked] = useState([]);
            const toggle = (t) => { if (checked.includes(t)) setChecked(checked.filter(x => x !== t)); else setChecked([...checked, t]); };
            return (
                <div className="space-y-8">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請勾選您認為您具備的特質。</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {TRAITS_LIST.map(t => (
                    <label key={t} className={`flex items-center gap-3 p-4 rounded-lg border cursor-pointer transition-all select-none ${checked.includes(t) ? 'border-slate-800 bg-gray-50 shadow-sm' : 'border-gray-200 hover:border-slate-300 bg-white'}`}>
                        <input type="checkbox" className="hidden" checked={checked.includes(t)} onChange={() => toggle(t)} />
                        <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${checked.includes(t) ? 'bg-slate-800 border-slate-800' : 'bg-white border-gray-300'}`}>{checked.includes(t) && <CheckCircle size={14} className="text-white" />}</div>
                        <span className={`font-bold ${checked.includes(t) ? 'text-slate-900' : 'text-slate-600'}`}>{t}</span>
                    </label>
                    ))}
                </div>
                <button onClick={() => onFinish(checked)} className="w-full btn-prominent mt-6">{isLastStep ? "完成所有測驗" : "下一步"}</button>
                </div>
            );
        }

        function EnneagramModule({ onFinish, isLastStep }) {
            const [selections, setSelections] = useState({});
            const isComplete = ENNEAGRAM_QUESTIONS.every(q => selections[q.id] !== undefined);
            return (
                <div className="space-y-8">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請勾選「是」如果該描述非常符合您，否則勾選「否」。</div>
                <div className="grid grid-cols-1 gap-4">
                    {ENNEAGRAM_QUESTIONS.map((q) => (
                    <div key={q.id} className="p-4 bg-white border border-gray-200 rounded-lg flex flex-col md:flex-row justify-between items-center gap-4 hover:border-slate-300 transition-colors">
                        <span className="font-bold text-slate-700 flex-1">{q.text}</span>
                        <div className="flex gap-2 shrink-0">
                        <button onClick={() => setSelections({...selections, [q.id]: 1})} className={`px-4 py-2 rounded-md font-bold border transition-colors ${selections[q.id] === 1 ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-gray-200 hover:bg-gray-50'}`}>是</button>
                        <button onClick={() => setSelections({...selections, [q.id]: 0})} className={`px-4 py-2 rounded-md font-bold border transition-colors ${selections[q.id] === 0 ? 'bg-slate-600 text-white border-slate-600' : 'bg-white text-slate-400 border-gray-200 hover:bg-gray-50'}`}>否</button>
                        </div>
                    </div>
                    ))}
                </div>
                <button onClick={() => {
                    const scores = {};
                    ENNEAGRAM_QUESTIONS.forEach(q => { if(selections[q.id] === 1) scores[q.type] = (scores[q.type] || 0) + 1; });
                    onFinish(scores);
                }} disabled={!isComplete} className="w-full btn-prominent mt-6">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function BigFiveModule({ onFinish, isLastStep }) {
            const [ratings, setRatings] = useState({});
            const isComplete = BIG5_QUESTIONS.every(q => ratings[q.id]);
            return (
                <div className="space-y-8">
                <div className="bg-slate-50 border-l-4 border-slate-600 p-4 text-slate-700 font-semibold text-sm">請評分以下描述符合您的程度 (1:非常不同意 - 5:非常同意)。</div>
                {BIG5_QUESTIONS.map((q) => (
                    <div key={q.id} className="space-y-2">
                    <div className="font-bold text-slate-700">{q.text}</div>
                    <div className="flex justify-between gap-2">
                        {[1,2,3,4,5].map(v => (
                        <button key={v} onClick={() => setRatings({...ratings, [q.id]: v})} className={`flex-1 py-3 rounded-md font-bold border transition-all ${ratings[q.id] === v ? 'bg-slate-800 text-white border-slate-800 shadow-md' : 'bg-white text-slate-400 border-gray-200 hover:bg-gray-50'}`}>{v}</button>
                        ))}
                    </div>
                    </div>
                ))}
                <button onClick={() => {
                    const scores = { O: 0, C: 0, E: 0, A: 0, N: 0 };
                    BIG5_QUESTIONS.forEach(q => {
                    const raw = ratings[q.id];
                    const val = q.rev ? (6 - raw) : raw;
                    scores[q.dim] = (scores[q.dim] || 0) + val;
                    });
                    onFinish(scores);
                }} disabled={!isComplete} className="w-full btn-prominent mt-6">{isLastStep ? "完成測驗" : "下一步"}</button>
                </div>
            );
        }

        function HollandModule({ onFinish, isLastStep }) {

        function QuizRunner({ config, candidateInfo, onComplete, onProgress }) {
            const [step, setStep] = useState(0);
            const [currentAnswers, setCurrentAnswers] = useState({});
            const moduleKey = config.modules[step];
            const isLastStep = step === config.modules.length - 1;

            const handleModuleFinish = (data) => {
                const nextAnswers = { ...currentAnswers, [moduleKey]: data };
                setCurrentAnswers(nextAnswers);
                if(onProgress) onProgress(nextAnswers);
                
                if (!isLastStep) {
                setStep(prev => prev + 1);
                window.scrollTo(0, 0);
                } else {
                onComplete(nextAnswers);
                }
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-lg shadow-md border border-gray-200 animate-fade-in">
                <div className="mb-8 pb-4 border-b border-gray-100 flex justify-between items-end">

                    <span className="text-slate-600 font-bold bg-gray-100 px-3 py-1 rounded-full text-xs tracking-wider">STEP {step + 1} / {config.modules.length}</span>
                    <h2 className="text-2xl font-extrabold text-slate-900 mt-3 uppercase tracking-tight">{moduleKey}</h2>

                    <div className="text-right text-xs font-semibold text-slate-400">受測者：{candidateInfo.name}</div>

                {moduleKey === 'values' && <ValuesModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'outcomes' && <OutcomesModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'traits' && <TraitsModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}

                {moduleKey === 'big5' && <BigFiveModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                {moduleKey === 'holland' && <HollandModule onFinish={handleModuleFinish} isLastStep={isLastStep} />}
                </div>
            );
        }

                            <div key={item.id} className={`flex items-start gap-3 p-3 rounded-md border transition-all ${i < 3 ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-gray-100'}`}>
                            <div className={`w-6 h-6 rounded flex items-center justify-center text-xs font-bold shrink-0 mt-0.5 ${i === 0 ? 'bg-yellow-100 text-yellow-800 ring-2 ring-yellow-200' : i === 1 ? 'bg-gray-200 text-slate-700 ring-2 ring-gray-300' : i === 2 ? 'bg-amber-100 text-amber-800 ring-2 ring-amber-200' : 'bg-white text-slate-400 border border-gray-200'}`}>
                                {i+1}
                            </div>
                            <div>
                                <span className={`text-sm font-bold block mb-1 ${i < 3 ? 'text-emerald-900' : 'text-slate-800'}`}>
                                {item.term}
                                </span>
                                <span className={`text-xs block leading-relaxed ${i < 3 ? 'text-emerald-700' : 'text-slate-500'}`}>
                                {item.desc}
                                </span>
                            </div>
                            </div>
                        ))}
                        </div>
                    </section>
                    )}

                    {/* 7. TRAITS */}
                    {answers.traits && (
                    <section className="card">
                        <h3 className="text-lg font-bold text-slate-800 border-l-4 border-purple-800 pl-3 mb-6">7. 成功特質檢核 (全 35 項)</h3>
                        
                        <div className="mb-6">
                        <h4 className="text-sm font-bold text-emerald-700 mb-3 flex items-center gap-2"><CheckCircle size={18}/> 您認為您具備的特質 ({answers.traits.length})</h4>
                        <div className="flex flex-wrap gap-2">
                            {answers.traits.map((t) => (
                            <span key={t} className="px-3 py-1.5 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-md text-xs font-bold shadow-sm">{t}</span>
                            ))}
                        </div>
                        </div>

                        <div className="opacity-75">
                        <h4 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-2"><HelpCircle size={18}/> 未勾選項目 / 潛在盲點 ({TRAITS_LIST.length - answers.traits.length})</h4>
                        <div className="flex flex-wrap gap-2">
                            {TRAITS_LIST.filter(t => !answers.traits.includes(t)).map(t => (
                            <span key={t} className="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-400 rounded-md text-xs">{t}</span>
                            ))}
                        </div>
                        </div>
                    </section>
                    )}

                    {/* 8. AI REPORT */}
                    <section className="card page-break-before">
                    <div className="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <Brain size={20} className="text-slate-700"/> 8. AI 深度分析報告
                        </h3>
                        <button 
                        onClick={() => setIsEditingReport(!isEditingReport)}
                        className={`flex items-center gap-1 px-3 py-1.5 rounded-md text-sm font-bold transition-colors no-print ${isEditingReport ? 'bg-emerald-100 text-emerald-800' : 'bg-gray-100 text-slate-600 hover:bg-gray-200'}`}
                        >
                        {isEditingReport ? <><Eye size={16}/> 預覽列印模式</> : <><Edit3 size={16}/> 編輯模式</>}
                        </button>
                    </div>
                        
                    {isEditingReport ? (
                        <div className="space-y-2 no-print">
                        <textarea 
                            className="w-full h-96 p-4 border border-gray-300 rounded-md focus:ring-2 focus:ring-slate-200 focus:border-slate-400 outline-none text-slate-700 leading-relaxed font-mono text-sm"
                            placeholder="請在此貼上 ChatGPT 生成的分析報告..."
                            value={aiReportContent}
                            onChange={(e) => setAiReportContent(e.target.value)}
                        ></textarea>
                        <p className="text-xs text-slate-400 text-right">💡 提示：貼上後請切換至「預覽列印模式」以確認排版。</p>
                        </div>
                    ) : (
                        <div className="ai-report-content bg-white p-0 text-slate-700 leading-relaxed whitespace-pre-wrap font-sans text-sm">
                        {aiReportContent || <span className="text-slate-400 italic">（尚未輸入 AI 分析報告）</span>}
                        </div>
                    )}
                    </section>
                </div>

                {/* FOOTER ACTIONS - 4 BUTTONS */}
                <div className="fixed bottom-0 left-0 right-0 p-3 bg-white/95 backdrop-blur border-t border-gray-200 shadow-[0_-5px_20px_rgba(0,0,0,0.05)] z-50 no-print">
                    <div className="flex justify-center mb-2">
                        <button onClick={() => { if(isEditingReport) setIsEditingReport(false); setTimeout(() => handleSafePrint(showToast, candidateInfo.name), 100); }} className="w-full md:w-auto min-w-[200px] flex items-center justify-center gap-2 px-6 py-2 bg-slate-900 text-white rounded-md font-bold hover:bg-slate-800 transition-all shadow-md active:scale-95">
                        <Printer size={18}/> 列印報告
                        </button>
                    </div>

                    <div className="grid grid-cols-2 lg:flex lg:justify-center gap-2">
                        <button onClick={() => handleCopyText(getInsuranceAgentPrompt(), () => showToast("保險業務分析指令已複製", "success"))} className="flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-2 px-2 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-md font-bold text-xs lg:text-sm hover:bg-slate-200 transition-all active:scale-95 text-center">
                        <Briefcase size={16} className="text-indigo-600"/> <span>業務潛能分析</span>
                        </button>
                        
                        <button onClick={() => handleCopyText(getCandidatePrompt(), () => showToast("受測者回饋指令已複製", "success"))} className="flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-2 px-2 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-md font-bold text-xs lg:text-sm hover:bg-slate-200 transition-all active:scale-95 text-center">
                        <User size={16} className="text-emerald-600"/> <span>受測者回饋</span>
                        </button>

                        <button onClick={() => handleCopyText(getSalesAssistantPrompt(), () => showToast("業務助理分析指令已複製", "success"))} className="flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-2 px-2 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-md font-bold text-xs lg:text-sm hover:bg-slate-200 transition-all active:scale-95 text-center">
                        <Users size={16} className="text-orange-600"/> <span>助理適配分析</span>
                        </button>

                        <button onClick={() => handleCopyText(getAssistantToAgentPrompt(), () => showToast("轉型引導指令已複製", "success"))} className="flex flex-col lg:flex-row items-center justify-center gap-1 lg:gap-2 px-2 py-2 bg-slate-100 border border-slate-300 text-slate-700 rounded-md font-bold text-xs lg:text-sm hover:bg-slate-200 transition-all active:scale-95 text-center">
                        <TrendingUp size={16} className="text-rose-600"/> <span>助理轉正引導</span>
                        </button>
                    </div>
                </div>
                </div>
            );
        }

        function PersonalityPortal() {
            const [view, setView] = useState('landing');
            const [isGodMode, setIsGodMode] = useState(false);
            const [godModeClicks, setGodModeClicks] = useState(0);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'info' });
            const [inputCode, setInputCode] = useState('');
            
            const [quizConfig, setQuizConfig] = useState(null);
            const [candidateInfo, setCandidateInfo] = useState({ name: '', dob: '' });
            const [answers, setAnswers] = useState({});

            // --- AUTO SAVE LOGIC ---
            useEffect(() => {
                const saved = localStorage.getItem('pp_autosave');
                if (saved) {
                // We don't auto-load to avoid confusion, but we could offer a "Resume" button
                // For now, we just log it. A production app might show a "Resume" prompt.
                }
            }, []);

            // Prevent accidental close
            useEffect(() => {
                const handleBeforeUnload = (e) => {
                if (view === 'quiz') {
                    e.preventDefault();
                    e.returnValue = '';
                }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [view]);

            const showToast = (msg, type = 'info') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            const handleLogoClick = () => {
                if (isGodMode) return;
                const next = godModeClicks + 1;
                setGodModeClicks(next);
                if (next === 5) {
                setIsGodMode(true);
                showToast("面試官模式已解鎖", "success");
                setGodModeClicks(0);
                }
            };

            const handleCodeSubmit = () => {
                if (!inputCode.trim()) {
                showToast("請輸入代碼", "error");
                return;
                }
                if (inputCode === '1111') {
                if (!isGodMode) {
                    showToast("權限不足：請先解鎖面試官模式", "error");
                    return;
                }
                loadDemoData();
                return;
                }
                const data = safeDecode(inputCode);
                if (data && data.modules) {
                setQuizConfig(data);
                const saved = localStorage.getItem('pp_autosave');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (confirm("發現未完成的測驗進度，是否恢復？\n(取消則開始新測驗)")) {
                    setAnswers(parsed.answers || {});
                    setCandidateInfo(parsed.candidateInfo || { name: '', dob: '' });
                    showToast("已恢復上次進度", "success");
                    } else {
                    setAnswers({});
                    setCandidateInfo({ name: '', dob: '' });
                    localStorage.removeItem('pp_autosave');
                    }
                } else {
                    setAnswers({});
                    setCandidateInfo({ name: '', dob: '' });
                }
                setView('candidate-info');
                showToast("測驗載入成功", "success");
                return;
                }
                if (data && data.answers) {
                if (!isGodMode) {
                    showToast("權限不足：僅面試官可查看結果", "error");
                    return;
                }
                setQuizConfig(data.config);
                setAnswers(data.answers);
                setCandidateInfo(data.candidate || { name: '未知', dob: '未知' });
                setView('result');
                showToast("報告解析成功", "success");
                return;
                }
                showToast("無效的代碼格式", "error");
            };

            const loadDemoData = () => {
                setQuizConfig({ 
                modules: ['disc', 'values', 'outcomes', 'traits', 'enneagram', 'big5', 'holland'], 
                timestamp: Date.now() 
                });
                setCandidateInfo({ name: '測試員 DEMO', dob: '1995-01-01' });
                setAnswers({
                disc: { D: 6, I: 3, S: 1, C: 0 },
                values: { "升遷": 5, "成就感": 8, "待遇": 6, "自主性": 2, "環境": 4, "同事": 3, "自我成長": 7 },
                outcomes: OUTCOMES_ITEMS.slice(),
                traits: TRAITS_LIST.slice(0, 10),
                enneagram: { "1": 1, "2": 0, "3": 5, "4": 0, "5": 1, "6": 2, "7": 4, "8": 3, "9": 1 },
                big5: { E: 6, A: 7, C: 8, N: 3, O: 9 },
                holland: { R: 2, I: 4, A: 5, S: 3, E: 5, C: 1 }
                });
                setView('result');
                showToast("Demo 數據已載入", "success");
            };

            return (
                <div className="min-h-screen bg-gray-50 text-slate-800 font-sans selection:bg-slate-200 selection:text-slate-900" style={{ fontFamily: '"Microsoft JhengHei", "Noto Sans TC", sans-serif' }}>
                
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/95 no-print">
                    <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
                    <div onClick={handleLogoClick} className="flex items-center gap-2 cursor-pointer select-none group">
                        <div className={`p-1.5 rounded-md transition-colors ${isGodMode ? 'bg-red-50' : 'bg-slate-100 group-hover:bg-slate-200'}`}>
                        <Shield className={isGodMode ? 'text-red-500' : 'text-slate-700'} size={20} />
                        </div>
                        <div>
                        <h1 className="font-bold text-lg tracking-tight text-slate-900 leading-none">Personality Portal</h1>
                        {isGodMode && <span className="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold tracking-wider uppercase">ADMIN</span>}
                        </div>
                    </div>
                    <div className="flex gap-3">
                        {view !== 'landing' && (
                            <button onClick={() => setView('landing')} className="text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
                            回首頁
                            </button>
                        )}
                    </div>
                    </div>
                </header>

                {toast.show && (
                    <div className={`fixed top-20 right-4 z-50 px-6 py-4 rounded-lg shadow-lg flex items-center gap-3 animate-bounce-in border ${
                    toast.type === 'error' ? 'bg-red-50 text-red-700 border-red-100' : 
                    toast.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 
                    'bg-slate-800 text-white border-slate-700'
                    } no-print`}>
                    {toast.type === 'error' ? <AlertCircle size={20}/> : <CheckCircle size={20}/>}
                    <span className="font-semibold tracking-wide">{toast.msg}</span>
                    </div>
                )}

                <main className="max-w-4xl mx-auto px-4 py-10">
                    
                    {/* LANDING VIEW */}
                    {view === 'landing' && (
                    <div className="flex flex-col items-center justify-center min-h-[50vh] space-y-8 animate-fade-in">
                        <div className="text-center space-y-3">
                        <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">人才潛能評測系統</h2>
                        <p className="text-slate-500 font-medium">Professional Personality Assessment</p>
                        </div>
                        <div className="bg-white p-8 rounded-lg shadow-md border border-gray-200 w-full max-w-lg transition-all hover:shadow-lg">
                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">輸入存取代碼 (Config / Result)</label>
                        <div className="flex gap-2">
                            <input 
                            type="text" 
                            value={inputCode}
                            onChange={(e) => setInputCode(e.target.value)}
                            placeholder="在此貼上代碼..."
                            className="flex-1 p-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-slate-500 focus:border-slate-500 outline-none font-mono text-sm transition-all"
                            />
                            <button 
                            onClick={handleCodeSubmit}
                            className="bg-slate-900 hover:bg-slate-800 text-white px-6 rounded-md transition-all shadow-sm active:translate-y-0.5 flex items-center justify-center"
                            >
                            <Play size={18} fill="currentColor" />
                            </button>
                        </div>
                        </div>
                        
                        {/* GOD MODE MENU */}
                        {isGodMode && (
                        <div className="w-full max-w-lg pt-4 grid grid-cols-2 gap-3">
                            <button 
                            onClick={() => setView('setup')}
                            className="col-span-2 w-full bg-slate-800 text-white p-4 rounded-lg flex items-center justify-center gap-2 hover:bg-slate-900 transition-all shadow-md font-semibold tracking-wide"
                            >
                            <Settings size={18} />
                            建立新測驗
                            </button>
                            <button 
                            onClick={() => setView('tutorial')}
                            className="bg-white text-slate-700 border border-gray-200 p-4 rounded-lg flex flex-col items-center justify-center gap-2 hover:border-slate-300 hover:bg-gray-50 transition-all font-semibold"
                            >
                            <BookOpen size={20} className="text-slate-600"/>
                            系統教學
                            </button>
                            <button 
                            onClick={() => setView('deep-dive')}
                            className="bg-white text-slate-700 border border-gray-200 p-4 rounded-lg flex flex-col items-center justify-center gap-2 hover:border-slate-300 hover:bg-gray-50 transition-all font-semibold"
                            >
                            <Brain size={20} className="text-slate-600"/>
                            測驗深度解析
                            </button>
                            <button 
                            onClick={() => setView('ai-only')}
                            className="col-span-2 bg-gray-100 text-slate-700 border border-gray-200 p-4 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-200 transition-all font-semibold"
                            >
                            <FilePlus size={18} className="text-slate-600"/>
                            純 AI 報告生成器 (貼上並列印)
                            </button>
                        </div>
                        )}
                    </div>
                    )}

                    {view === 'setup' && <QuizConfigurator showToast={showToast} onGenerate={() => {}} />}

                    {view === 'candidate-info' && (
                    <div className="bg-white p-8 rounded-lg shadow-md border border-gray-200 max-w-lg mx-auto animate-fade-in">
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-2 text-slate-800 tracking-tight"><User className="text-slate-700" /> 受試者資料</h2>
                        <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-2">真實姓名</label>
                            <input type="text" value={candidateInfo.name} onChange={(e) => setCandidateInfo({...candidateInfo, name: e.target.value})} className="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-slate-500 outline-none transition-all" placeholder="請輸入姓名" />
                        </div>
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-2">出生年月日</label>
                            <input type="date" value={candidateInfo.dob} onChange={(e) => setCandidateInfo({...candidateInfo, dob: e.target.value})} className="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-slate-500 outline-none transition-all" />
                        </div>
                        <button onClick={() => { if(!candidateInfo.name || !candidateInfo.dob) { showToast("請完整填寫資料", "error"); return; } setView('quiz'); }} className="w-full btn-prominent mt-4 flex items-center justify-center gap-2">開始測驗 <ArrowRight size={18} /></button>
                        </div>
                    </div>
                    )}

                    {view === 'quiz' && quizConfig && (
                    <QuizRunner 
                        config={quizConfig}
                        candidateInfo={candidateInfo}
                        showToast={showToast}
                        onComplete={(finalAnswers) => {
                        const resultCode = safeEncode({ config: quizConfig, answers: finalAnswers, candidate: candidateInfo, completedAt: Date.now() });
                        setAnswers(finalAnswers);
                        setInputCode(resultCode);
                        localStorage.removeItem('pp_autosave'); 
                        setView('finish');
                        }}
                        onProgress={(current) => {
                        localStorage.setItem('pp_autosave', JSON.stringify({ candidateInfo, answers: current }));
                        }}
                    />
                    )}

                    {view === 'finish' && (
                    <div className="bg-white p-10 rounded-lg shadow-lg border border-gray-200 text-center space-y-6 max-w-2xl mx-auto mt-8 animate-fade-in">
                        <div className="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto ring-4 ring-emerald-50/50">
                        <CheckCircle size={32} strokeWidth={2.5} />
                        </div>
                        <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">測驗完成</h2>
                        <p className="text-slate-600 font-medium text-lg">請複製下方代碼並傳送給面試官。<br/><span className="text-rose-600 text-xs font-bold block mt-3 uppercase tracking-wider">注意：關閉視窗前請確保代碼已傳送</span></p>
                        <div className="relative group">
                        <div className="bg-gray-50 p-6 rounded-md break-all font-mono text-sm border border-gray-300 text-slate-600 text-left min-h-[100px] shadow-inner">{inputCode}</div>
                        <button onClick={() => handleCopyText(inputCode, () => showToast("已複製", "success"))} className="absolute top-2 right-2 p-2 bg-white rounded-md shadow-sm border border-gray-200 text-slate-600 hover:bg-slate-100 transition-colors"><Copy size={16} /></button>
                        </div>
                    </div>
                    )}

                    {view === 'result' && <ResultDashboard answers={answers} config={quizConfig} candidateInfo={candidateInfo} showToast={showToast} />}

                    {/* --- NEW VIEWS FOR ADMIN --- */}
                    
                    {view === 'tutorial' && (
                    <div className="bg-white p-8 rounded-lg shadow-md border border-gray-200 max-w-3xl mx-auto animate-fade-in">
                        <h2 className="text-2xl font-bold text-slate-900 mb-8 flex items-center gap-3"><BookOpen className="text-slate-700"/> 系統使用教學</h2>
                        <div className="space-y-8">
                        <div className="flex gap-4">
                            <div className="w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold shrink-0 text-sm">1</div>
                            <div>
                            <h3 className="font-bold text-lg mb-1 text-slate-800">建立測驗 (HR 端)</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">在首頁解鎖管理員模式後，點擊「建立新測驗」。勾選您需要的模組（建議全選以獲得完整報告），點擊生成 Config Code 並複製給受測者。</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold shrink-0 text-sm">2</div>
                            <div>
                            <h3 className="font-bold text-lg mb-1 text-slate-800">進行測驗 (受測者 端)</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">受測者在首頁貼上 Config Code，填寫姓名與生日後開始作答。所有測驗完成後，系統會生成一組 Result Code。</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold shrink-0 text-sm">3</div>
                            <div>
                            <h3 className="font-bold text-lg mb-1 text-slate-800">解析報告 (HR 端)</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">HR 拿到 Result Code 後，在首頁貼上並送出（需先解鎖管理員）。系統將顯示視覺化報告，並提供 AI 指令供您複製到 ChatGPT 生成深度文案，最後可貼回報告並列印。</p>
                            </div>
                        </div>
                        </div>
                    </div>
                    )}

                    {view === 'deep-dive' && (
                    <div className="bg-white p-8 rounded-lg shadow-md border border-gray-200 max-w-3xl mx-auto animate-fade-in">
                        <h2 className="text-2xl font-bold text-slate-900 mb-8 flex items-center gap-3"><Brain className="text-slate-700"/> 測驗深度解析</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-blue-800 mb-2">DISC 行為風格</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">測量外顯行為與溝通模式。D(支配)、I(影響)、S(穩健)、C(分析)。用於判斷「他怎麼做事」。</p>
                        </div>
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-indigo-800 mb-2">工作價值觀</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">兩兩比較法找出內心最看重的回饋。如：升遷、錢、自由、成就感。用於判斷「他要什麼」。</p>
                        </div>
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-emerald-800 mb-2">Outcomes 驅動力</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">更深層的心理動機，如：權力、利他、美感。用於判斷「什麼能激勵他」。</p>
                        </div>
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-purple-800 mb-2">成功特質 Traits</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">自我認知的強項檢核。未勾選的項目可視為「盲點」或「自信缺乏區」。</p>
                        </div>
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-rose-800 mb-2">九型人格</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">揭示核心渴望與恐懼。如 Type 3 成就型怕失敗、Type 8 領袖型怕被掌控。</p>
                        </div>
                        <div className="p-5 border border-gray-200 rounded-lg hover:border-slate-300 transition-colors">
                            <h3 className="font-bold text-base text-sky-800 mb-2">大五人格 OCEAN</h3>
                            <p className="text-sm text-slate-600 leading-relaxed">心理學界公認最穩定的特質模型。預測長期工作績效最準確（尤其是盡責性 C）。</p>
                        </div>
                        </div>
                    </div>
                    )}

                    {view === 'ai-only' && <AiReportGenerator showToast={showToast} />}

                </main>

                <footer className="py-6 text-center text-slate-400 text-[10px] font-semibold tracking-wider uppercase no-print">Pure Offline Architecture • 2026 Personality Portal Enterprise</footer>

                <style>{`
                    .btn-prominent {
                    background-color: #0f172a; /* Slate 900 */
                    color: white;
                    font-weight: 600;
                    padding: 0.75rem 1.5rem;
                    border-radius: 0.5rem; /* rounded-lg */
                    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
                    transition: all 0.2s;
                    border: 1px solid transparent;
                    }
                    .btn-prominent:hover {
                    background-color: #1e293b; /* Slate 800 */
                    transform: translateY(-1px);
                    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                    }
                    .btn-prominent:active {
                    transform: translateY(0);
                    }
                    .btn-prominent:disabled {
                    opacity: 0.5;
                    transform: none;
                    box-shadow: none;
                    cursor: not-allowed;
                    }
                    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
                    .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
                    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                    @keyframes bounceIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                    .custom-scroller::-webkit-scrollbar { width: 6px; }
                    .custom-scroller::-webkit-scrollbar-track { background: transparent; }
                    .custom-scroller::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                    .custom-scroller::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                    
                    /* Print Styles for Traits */
                    .print-only { display: none; }
                    @media print {
                    .print-only { display: block !important; }
                    .no-print { display: none !important; }
                    }
                `}</style>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<PersonalityPortal />);
    </script>
</body>
</html>
