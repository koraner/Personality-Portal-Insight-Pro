                setAnswers({}); setQuizStartTime(Date.now()); setQuizDuration(null); setView('quiz');
            };

            const [secretClicks, setSecretClicks] = useState(0);
            const triggerDemo = () => {
                const nextClicks = secretClicks + 1;
                setSecretClicks(nextClicks);
                if (nextClicks === 5) {
                    setCandidateInfo({ name: '測試員 DEMO (校園)', dob: '1999-01-01' });
                    setQuizConfig({ modules: MODULES_MAP, timestamp: Date.now() });
                    setAnswers({ disc: { D: 6, I: 3, S: 1, C: 0 }, values: { "升遷": 5, "成就感": 8, "待遇": 6, "自主性": 2, "環境": 4, "同事": 3, "自我成長": 7 }, outcomes: OUTCOMES_ITEMS.slice(), traits: TRAITS_LIST.slice(0, 10), enneagram: { "1": 1, "2": 0, "3": 5, "4": 0, "5": 1, "6": 2, "7": 4, "8": 3, "9": 1 }, big5: { E: 6, A: 7, C: 8, N: 3, O: 9 }, holland: { R: 2, I: 4, A: 5, S: 3, E: 5, C: 1 } });
                    setQuizDuration(380); setView('result'); showToast("載入 Demo (校園版)", "success");
                    setSecretClicks(0);
                }
                setTimeout(() => setSecretClicks(prev => Math.max(0, prev - 1)), 1000);
            };

            return (
                <div className="bg-white p-6 sm:p-8 md:p-12 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-200 max-w-2xl mx-auto animate-fade-in">
                    <h2 onClick={triggerDemo} className="text-xl font-black text-slate-800 mb-6 sm:mb-8 text-center bg-slate-50 py-4 rounded-lg border border-slate-200 select-none cursor-pointer">請設定測驗項目並讓求職者填寫資料</h2>
                    <div className="mb-8 space-y-4">
                        <div className="flex items-center gap-2 mb-2 text-slate-800 font-black text-lg"><User size={20}/> 受測者資料</div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <input type="text" value={candidateInfo.name} onChange={(e) => setCandidateInfo({...candidateInfo, name: e.target.value})} autoComplete="off" className="w-full p-4 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-slate-200 focus:border-slate-800 outline-none transition-all text-lg font-bold placeholder:font-bold bg-gray-50 focus:bg-white" placeholder="請輸入姓名 (必填)" />
                            <input type="date" value={candidateInfo.dob} onChange={(e) => setCandidateInfo({...candidateInfo, dob: e.target.value})} autoComplete="off" className="w-full p-4 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-slate-200 focus:border-slate-800 outline-none transition-all text-slate-700 font-bold bg-gray-50 focus:bg-white" />
                        </div>
                    </div>
                    <div className="mb-10">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2 text-slate-800 font-black text-lg"><List size={20}/> 測驗項目</div>
                            <button onClick={() => setLocalModules({disc: true, values: true, outcomes: true, traits: true, enneagram: true, big5: true, holland: true})} className="text-sm text-indigo-700 hover:text-indigo-900 font-black px-4 py-2 rounded-lg hover:bg-indigo-100 transition-colors active:scale-95 bg-indigo-50 border border-indigo-200">全選</button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                            {[{ id: 'disc', label: '1. DISC 行為風格', sub: '溝通與行事作風' }, { id: 'values', label: '2. 工作價值觀', sub: '找尋核心在乎事物' }, { id: 'outcomes', label: '3. Outcomes 驅動力', sub: '深層心理動機' }, { id: 'traits', label: '4. 成功特質檢核', sub: '自信與盲點掃描' }, { id: 'enneagram', label: '5. 九型人格', sub: '核心渴望與恐懼' }, { id: 'big5', label: '6. 大五人格', sub: '穩定性與盡責度' }, { id: 'holland', label: '7. Holland 職業興趣', sub: '適合的任務型態' }].map(m => (
                            <div key={m.id} onClick={() => setLocalModules({...localModules, [m.id]: !localModules[m.id]})} className={`p-4 sm:p-5 border-2 rounded-xl cursor-pointer transition-all flex justify-between items-center select-none active:scale-95 ${localModules[m.id] ? 'border-slate-800 bg-slate-50 shadow-sm' : 'border-gray-200 hover:bg-gray-50'}`}>
                                <div><div className={`font-black text-base sm:text-lg ${localModules[m.id] ? 'text-slate-900' : 'text-slate-500'}`}>{m.label}</div><div className="text-sm font-bold text-slate-500 mt-1">{m.sub}</div></div>
                                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center transition-colors ${localModules[m.id] ? 'bg-slate-800 border-slate-800 text-white' : 'border-gray-300 bg-white text-transparent'}`}><CheckCircle size={18} fill="currentColor" className="text-slate-800"/></div>
                            </div>
                            ))}
                        </div>
                    </div>
                    <button onClick={handleCampusStart} className="w-full bg-slate-900 text-white font-black text-xl py-5 rounded-xl hover:bg-slate-800 transition-all shadow-lg active:translate-y-1 flex justify-center items-center gap-3">
                        <Play size={24} fill="currentColor"/> 立即開始測驗
                    </button>
                </div>
            );
        }

        // --- MAIN APPLICATION ---
        function PersonalityPortal() {
            const [view, setView] = useState('landing');
            const [systemMode, setSystemMode] = useState('standard');
            
            const [isGodMode, setIsGodMode] = useState(false);
            const [godModeClicks, setGodModeClicks] = useState(0);
            
            const [toast, setToast] = useState({ show: false, msg: '', type: 'info' });
            const [inputCode, setInputCode] = useState('');
            
            const [quizConfig, setQuizConfig] = useState(null);
            const [candidateInfo, setCandidateInfo] = useState({ name: '', dob: '' });
            const [answers, setAnswers] = useState({});
            
            const [quizStartTime, setQuizStartTime] = useState(null);
            const [quizDuration, setQuizDuration] = useState(null);

            useEffect(() => {
                const handleBeforeUnload = (e) => { if (view === 'quiz') { e.preventDefault(); e.returnValue = ''; } };
                window.addEventListener('beforeunload', handleBeforeUnload); return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [view]);

            const showToast = (msg, type = 'info') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            const handleLogoClick = () => {
                const next = godModeClicks + 1; setGodModeClicks(next);
                if (next === 5) { 
                    if (systemMode === 'campus') {
                        setCandidateInfo(DEMO_CANDIDATE);
                        setQuizConfig({ modules: MODULES_MAP, timestamp: Date.now() });
                        setAnswers(DEMO_ANSWERS);
                        setQuizDuration(380); setView('result'); showToast("載入 Demo (校園版)", "success");
                    } else {
                        if (!isGodMode) { setIsGodMode(true); showToast("管理員模式已解鎖", "success"); }
                    }
                    setGodModeClicks(0); 
                }
                setTimeout(() => { setGodModeClicks(prev => Math.max(0, prev - 1)); }, 1000);
            };

            const handleCodeSubmit = () => {
                if (!inputCode.trim()) { showToast("請輸入代碼", "error"); return; }
                if (inputCode === '1111') {
                    if (!isGodMode) { showToast("權限不足：請先解鎖管理員模式", "error"); return; }
                    setQuizConfig({ modules: MODULES_MAP, timestamp: Date.now() });
                    setCandidateInfo(DEMO_CANDIDATE);
                    setAnswers(DEMO_ANSWERS);
                    setView('result'); showToast("Demo 數據已載入", "success"); return;
                }
                const data = safeDecode(inputCode);
                if (data && data.modules) {
                    setQuizConfig(data); setAnswers({}); setCandidateInfo({ name: '', dob: '' }); setView('candidate-info'); showToast("測驗載入成功", "success"); return;
                }
                if (data && data.answers) {
                    if (!isGodMode) { showToast("權限不足：僅面試官可查看結果", "error"); return; }
                    setQuizConfig(data.config); setAnswers(data.answers); setCandidateInfo(data.candidate || { name: '未知', dob: '未知' }); setView('result'); showToast("報告解析成功", "success"); return;
                }
                showToast("無效的代碼格式", "error");
            };

            const enterCampusMode = () => { setSystemMode('campus'); setView('campus-setup'); };
            
            const handleCampusReset = () => {
                if(confirm("確定清除當前資料，迎接下一位求職者？")) {
                    setCandidateInfo({ name: '', dob: '' }); setAnswers({}); setQuizConfig(null); setQuizStartTime(null); setQuizDuration(null); setView('campus-setup'); window.scrollTo(0, 0);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 text-slate-800 font-sans font-medium selection:bg-slate-200 selection:text-slate-900">
                
                <header className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/95 no-print">
                    <div className={`max-w-4xl mx-auto px-4 ${systemMode === 'campus' ? 'sm:px-6 h-16 md:h-20' : 'h-14'} flex items-center justify-between`}>
                        <div className="flex items-center gap-3 sm:gap-4 select-none cursor-pointer group" onClick={handleLogoClick}>
                            <div className={`p-2 sm:p-2.5 rounded-lg transition-colors shadow-sm ${systemMode === 'campus' ? 'bg-slate-900 text-white' : isGodMode ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-slate-100 text-slate-800 group-hover:bg-slate-200'}`}>
                                {systemMode === 'campus' ? <Target size={24} className="sm:w-7 sm:h-7" /> : <Shield size={20} />}
                            </div>
                            <div>
                                <h1 className={`font-black ${systemMode === 'campus' ? 'text-lg sm:text-xl mb-1' : 'text-lg'} tracking-tight text-slate-900 leading-none`}>Personality Portal</h1>
                                {systemMode === 'campus' ? <span className="text-[10px] sm:text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-md font-black tracking-widest uppercase border border-indigo-200">Campus Mode</span> : isGodMode && <span className="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-black tracking-wider uppercase">ADMIN</span>}
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {systemMode === 'campus' ? (
                                <>
                                    {view === 'result' && (
                                        <button onClick={handleCampusReset} className="text-sm font-black text-slate-700 hover:text-slate-900 transition-colors flex items-center gap-2 bg-slate-100 border border-slate-200 px-4 sm:px-5 py-2.5 rounded-lg active:scale-95 shadow-sm">
                                            <RefreshCw size={18} /> <span className="hidden sm:inline">下一位</span>
                                        </button>
                                    )}
                                </>
                            ) : (
                                view !== 'landing' && (
                                    <button onClick={() => setView('landing')} className="text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors">回首頁</button>
                                )
                            )}
                        </div>
                    </div>
                </header>

                {toast.show && (
                    <div className={`fixed top-24 right-4 z-50 px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 animate-bounce-in border-2 ${toast.type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : toast.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-slate-800 text-white border-slate-700'} no-print`}>
                        {toast.type === 'error' ? <AlertCircle size={24}/> : <CheckCircle size={24}/>}
                        <span className="font-black tracking-wide text-sm sm:text-base">{toast.msg}</span>
                    </div>
                )}

                <main className={`max-w-4xl mx-auto px-4 sm:px-6 ${systemMode === 'campus' ? 'py-8 sm:py-12' : 'py-10'}`}>
                    
                    {/* --- STANDARD MODE: LANDING --- */}
                    {systemMode === 'standard' && view === 'landing' && (
                    <div className="flex flex-col items-center justify-center min-h-[50vh] space-y-8 animate-fade-in">
                        <div className="text-center space-y-3">
                            <h2 className="text-4xl font-black text-slate-900 tracking-tight">人才潛能評測系統</h2>
                            <p className="text-slate-600 font-bold">Professional Personality Assessment</p>
                        </div>
                        <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 w-full max-w-lg transition-all hover:shadow-xl">
                            <label className="block text-xs font-black text-slate-600 uppercase tracking-wider mb-3">輸入存取代碼 (Config / Result)</label>
                            <div className="flex gap-3">
                                <input type="text" value={inputCode} onChange={(e) => setInputCode(e.target.value)} placeholder="在此貼上代碼..." className="flex-1 p-4 bg-gray-50 border border-gray-300 rounded-lg focus:ring-4 focus:ring-slate-200 focus:border-slate-600 outline-none font-mono text-base font-bold transition-all" />
                                <button onClick={handleCodeSubmit} className="bg-slate-900 hover:bg-slate-800 text-white px-6 rounded-lg transition-all shadow-md active:translate-y-0.5 flex items-center justify-center"><Play size={20} fill="currentColor" /></button>
                            </div>
                        </div>
                        
                        {/* GOD MODE MENU */}
                        {isGodMode && (
                        <div className="w-full max-w-lg pt-6 grid grid-cols-2 gap-4 animate-fade-in">
                            <button onClick={enterCampusMode} className="col-span-2 w-full bg-indigo-700 text-white p-6 rounded-xl flex items-center justify-center gap-3 hover:bg-indigo-800 transition-all shadow-[0_8px_20px_rgb(0,0,0,0.12)] font-black text-xl tracking-wide border border-indigo-600 mb-2 active:scale-[0.98]">
                                <Target size={28} /> 🎯 啟動「校園徵才」現場單機模式
                            </button>
                            <button onClick={() => setView('setup')} className="col-span-2 w-full bg-slate-800 text-white p-5 rounded-lg flex items-center justify-center gap-3 hover:bg-slate-900 transition-all shadow-md font-bold text-lg tracking-wide border border-slate-700">
                                <Settings size={20} /> 建立新測驗代碼 (遠端發送標準版)
                            </button>
                            <button onClick={() => setView('tutorial')} className="col-span-2 bg-white text-slate-700 border-2 border-gray-200 p-5 rounded-lg flex items-center justify-center gap-3 hover:border-slate-300 hover:bg-gray-50 transition-all font-bold text-lg shadow-sm">
                                <BookOpen size={22} className="text-slate-600"/> 系統教學
                            </button>
                        </div>
                        )}
                    </div>
                    )}

                    {/* --- STANDARD MODE: VIEWS --- */}
                    {systemMode === 'standard' && view === 'setup' && <QuizConfigurator showToast={showToast} onGenerate={() => {}} />}
                    
                    {systemMode === 'standard' && view === 'candidate-info' && (
                    <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-lg mx-auto animate-fade-in">
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-2 text-slate-800 tracking-tight"><User className="text-slate-700" /> 受測者資料</h2>
                        <div className="space-y-5">
                            <div><label className="block text-base font-bold text-slate-800 mb-2">真實姓名</label><input type="text" value={candidateInfo.name} onChange={(e) => setCandidateInfo({...candidateInfo, name: e.target.value})} className="w-full p-4 border border-gray-300 rounded-lg focus:ring-4 focus:ring-slate-200 focus:border-slate-800 outline-none font-bold text-lg bg-gray-50 focus:bg-white transition-all" placeholder="請輸入姓名" /></div>
                            <div><label className="block text-base font-bold text-slate-800 mb-2">出生年月日</label><input type="date" value={candidateInfo.dob} onChange={(e) => setCandidateInfo({...candidateInfo, dob: e.target.value})} className="w-full p-4 border border-gray-300 rounded-lg focus:ring-4 focus:ring-slate-200 focus:border-slate-800 outline-none font-bold text-slate-700 bg-gray-50 focus:bg-white transition-all" /></div>
                            <button onClick={() => { if(!candidateInfo.name || !candidateInfo.dob) { showToast("請完整填寫資料", "error"); return; } setView('quiz'); }} className="w-full btn-prominent mt-4 flex items-center justify-center gap-2 text-lg py-4 rounded-xl shadow-md">開始測驗 <ArrowRight size={20} /></button>
                        </div>
                    </div>
                    )}

                    {systemMode === 'standard' && view === 'finish' && (
                    <div className="bg-white p-12 rounded-xl shadow-xl border border-gray-200 text-center space-y-6 max-w-2xl mx-auto mt-8 animate-fade-in">
                        <div className="w-20 h-20 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto ring-4 ring-emerald-50/50"><CheckCircle size={40} strokeWidth={3} /></div>
                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">測驗完成</h2>
                        <p className="text-slate-700 font-bold text-lg leading-relaxed">請複製下方代碼並傳送給面試官。<br/><span className="text-rose-600 text-sm font-black block mt-4 uppercase tracking-widest bg-rose-50 inline-block px-4 py-2 rounded-lg border border-rose-200">⚠️ 關閉視窗前請確保代碼已傳送</span></p>
                        <div className="relative group mt-8">
                            <div className="bg-gray-50 p-8 rounded-xl break-all font-mono text-base font-bold border border-gray-300 text-slate-700 text-left min-h-[120px] shadow-inner">{inputCode}</div>
                            <button onClick={() => handleCopyText(inputCode, () => showToast("已複製", "success"))} className="absolute top-3 right-3 p-3 bg-white rounded-lg shadow-md border border-gray-200 text-slate-700 hover:bg-slate-50 transition-colors active:scale-95"><Copy size={20} /></button>
                        </div>
                    </div>
                    )}

                    {/* --- STANDARD MODE: TUTORIAL --- */}
                    {systemMode === 'standard' && view === 'tutorial' && (
                    <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 max-w-3xl mx-auto animate-fade-in">
                        <h2 className="text-2xl font-black text-slate-900 mb-8 flex items-center gap-3"><BookOpen className="text-slate-700"/> 雙模式系統使用教學</h2>
                        <div className="space-y-8">
                            <div className="p-6 border-2 border-indigo-200 bg-indigo-50 rounded-xl mb-8 shadow-sm">
                                <h3 className="font-black text-indigo-900 text-lg mb-3 flex items-center gap-2"><Target size={22}/> 校園徵才模式 (一條龍單機版)</h3>
                                <p className="text-indigo-800 text-base font-bold leading-relaxed mb-3">適合場景：實體博覽會、說明會。主打快速、高流動率。</p>
                                <ul className="list-disc ml-6 text-indigo-800 text-sm space-y-2 font-bold">
                                    <li>免傳遞代碼，受測者做完立即顯示報告。</li>
                                    <li>專屬 <span className="bg-indigo-100 px-2 py-0.5 rounded text-indigo-900">「作答真實性評估」</span>，秒抓亂點、護航。</li>
                                    <li>右上角「下一位」按鈕一鍵重置。</li>
                                </ul>
                            </div>
                            <div className="flex gap-5">
                                <div className="w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-black shrink-0 text-base shadow-md">1</div>
                                <div><h3 className="font-black text-lg mb-2 text-slate-800">建立測驗 (遠端發送)</h3><p className="text-slate-600 text-base font-bold leading-relaxed">首頁解鎖管理員模式後，點擊「建立新測驗代碼」。勾選模組，生成 Config Code 複製給受測者。</p></div>
                            </div>
                            <div className="flex gap-5">
                                <div className="w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-black shrink-0 text-base shadow-md">2</div>
                                <div><h3 className="font-black text-lg mb-2 text-slate-800">進行測驗 (受測端)</h3><p className="text-slate-600 text-base font-bold leading-relaxed">受測者在首頁貼上 Config Code 作答。完成後，系統會生成 Result Code。</p></div>
                            </div>
                            <div className="flex gap-5">
                                <div className="w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-black shrink-0 text-base shadow-md">3</div>
                                <div><h3 className="font-black text-lg mb-2 text-slate-800">解析報告 (面試官)</h3><p className="text-slate-600 text-base font-bold leading-relaxed">拿到 Result Code 後貼回首頁，系統將顯示視覺化報告及系統指令供您深度分析。</p></div>
                            </div>
                        </div>
                    </div>
                    )}

                    {/* --- CAMPUS MODE: SETUP --- */}
                    {systemMode === 'campus' && view === 'campus-setup' && (
                        <CampusSetup 
                            candidateInfo={candidateInfo} 
                            setCandidateInfo={setCandidateInfo} 
                            setQuizConfig={setQuizConfig} 
                            setAnswers={setAnswers} 
                            setQuizStartTime={setQuizStartTime} 
                            setQuizDuration={setQuizDuration} 
                            setView={setView} 
                            showToast={showToast} 
                        />
                    )}

                    {/* --- COMMON QUIZ RUNNER --- */}
                    {view === 'quiz' && quizConfig && (
                    <QuizRunner 
                        config={quizConfig} candidateInfo={candidateInfo} isCampusMode={systemMode === 'campus'}
                        onComplete={(finalAnswers) => {
                            if (systemMode === 'campus') {
                                const durationSecs = Math.round((Date.now() - quizStartTime) / 1000);
                                setAnswers(finalAnswers); setQuizDuration(durationSecs); setView('result');
                            } else {
                                const resultCode = safeEncode({ config: quizConfig, answers: finalAnswers, candidate: candidateInfo, completedAt: Date.now() });
                                setAnswers(finalAnswers); setInputCode(resultCode); setView('finish');
                            }
                        }}
                    />
                    )}

                    {/* --- COMMON RESULT DASHBOARD --- */}
                    {view === 'result' && <ResultDashboard answers={answers} config={quizConfig} candidateInfo={candidateInfo} showToast={showToast} isCampusMode={systemMode === 'campus'} duration={quizDuration} />}

                </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<PersonalityPortal />);
    </script>
</body>
</html>
